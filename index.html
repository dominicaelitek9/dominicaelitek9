<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kennel Assistant Chatbot</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 600px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background-color: #1e293b;
            color: #ffffff;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.1em;
        }
        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background-color: #f8fafc;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.95em;
            line-height: 1.4;
        }
        .client-msg {
            background-color: #3b82f6;
            color: #ffffff;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
        .bot-msg {
            background-color: #e2e8f0;
            color: #1e293b;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }
        .chat-input-area {
            display: flex;
            padding: 10px;
            background: #ffffff;
            border-top: 1px solid #e2e8f0;
        }
        .chat-input-area input {
            flex: 1;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            outline: none;
            font-size: 0.95em;
        }
        .chat-input-area button {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 0 16px;
            margin-left: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .chat-input-area button:hover {
            background-color: #059669;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">🐾 Kennel Assistant (Away Mode)</div>
    <div class="chat-box" id="chatBox">
        <div class="message bot-msg">Hello! Welcome to our Kennel. How can I help you today? (Ask about breeds, pricing, or availability!)</div>
    </div>
    <div class="chat-input-area">
        <input type="text" id="userInput" placeholder="Type your question here..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    // --- CONFIGURATION (Change your details here) ---
    const MANAGER_WHATSAPP = "[Insert WhatsApp Link/Number]";
    const SECRETARY_PHONE = "[Insert Phone Number]";
    // -------------------------------------------------

    const handoffInfo = `please contact our manager directly via WhatsApp at <b>${MANAGER_WHATSAPP}</b> or call our secretary at <b>${SECRETARY_PHONE}</b>!`;

    function getBotResponse(input) {
        const msg = input.toLowerCase();

        // Scenario 3: When are puppies arriving
        if (msg.includes("when") && (msg.includes("get") || msg.includes("arrive") || msg.includes("litter") || msg.includes("pupp"))) {
            return `We have exciting upcoming litters planned! For the exact dates, expected arrival times, and to get on our waiting list, ${handoffInfo} for administrative details.`;
        }

        // Scenario 2: Live availability / In stock right now
        if (msg.includes("right now") || msg.includes("available") || msg.includes("in stock") || msg.includes("have any")) {
            let breedIntro = "";
            if (msg.includes("german shepherd") || msg.includes("gsd") || msg.includes("working line")) {
                breedIntro = "Working line German Shepherds are incredible dogs! ";
            } else if (msg.includes("rottweiler") || msg.includes("rotti")) {
                breedIntro = "We love Rottweilers! ";
            } else if (msg.includes("malinois") || msg.includes("belgian")) {
                breedIntro = "Belgian Malinois are fantastic, high-drive dogs! ";
            }
            return `${breedIntro}Because our puppies go to their new homes quickly, our live inventory changes daily. I want to make sure you get accurate information, so please reach out to our manager via WhatsApp at <b>${MANAGER_WHATSAPP}</b> to check our current availability, or call our secretary at <b>${SECRETARY_PHONE}</b>.`;
        }

        // Scenario 1: Rottweiler General Interest & Price
        if (msg.includes("rottweiler") || msg.includes("rotti")) {
            return `We love Rottweilers! Our prices generally depend on the lineage and training of the pup. For our current exact pricing and to see who we have available right now, ${handoffInfo}`;
        }

        // German Shepherd General Interest & Price
        if (msg.includes("german shepherd") || msg.includes("gsd") || msg.includes("working line")) {
            return `We specialize in top-quality German Shepherds! Our prices generally depend on the lineage, working line vs show line, and training. For our current exact pricing and availability, ${handoffInfo}`;
        }

        // Belgian Malinois General Interest & Price
        if (msg.includes("malinois") || msg.includes("belgian")) {
            return `We love Belgian Malinois! Prices depend directly on their specific lineage and drive levels. For exact pricing and to see who is available right now, ${handoffInfo}`;
        }

        // Catch-all Default
        return `Thanks for reaching out! To better assist you with puppy availability, exact pricing, and upcoming litters, ${handoffInfo}`;
    }

    function sendMessage() {
        const inputField = document.getElementById("userInput");
        const chatBox = document.getElementById("chatBox");
        const userText = inputField.value.trim();

        if (userText === "") return;

        // Display Client Message
        const clientDiv = document.createElement("div");
        clientDiv.className = "message client-msg";
        clientDiv.innerText = userText;
        chatBox.appendChild(clientDiv);

        inputField.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        // Process and Display Bot Response
        setTimeout(() => {
            const botDiv = document.createElement("div");
            botDiv.className = "message bot-msg";
            botDiv.innerHTML = getBotResponse(userText);
            chatBox.appendChild(botDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }, 400); 
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") {
            sendMessage();
        }
    }
</script>

</body>
</html>
